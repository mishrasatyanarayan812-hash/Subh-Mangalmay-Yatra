<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - Made by Abhay Mishra</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to bottom, #70c5ce, #c4e8f5);
        font-family: 'Arial', sans-serif;
        overflow: hidden;
    }
    canvas {
        border: 3px solid #333;
        background: #70c5ce;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    #ui {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 28px;
        font-weight: bold;
        text-shadow: 2px 2px 4px #000;
    }
    #startScreen, #gameOverScreen {
        position: absolute;
        text-align: center;
        color: white;
        background: rgba(0,0,0,0.7);
        padding: 30px;
        border-radius: 15px;
    }
    #startScreen h1, #gameOverScreen h1 {
        font-size: 36px;
        margin-bottom: 15px;
        color: #ffeb3b;
    }
    #startScreen p, #gameOverScreen p {
        font-size: 18px;
        margin: 10px 0;
    }
    button {
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 20px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover { background: #45a049; }
   .credit { font-size: 14px; color: #ffeb3b; margin-top: 15px; }
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="startScreen">
    <h1>FLAPPY BIRD</h1>
    <p>Tap / Click / Space to Fly</p>
    <p>Collect Coins 💰 | Avoid Pipes</p>
    <button onclick="startGame()">START GAME</button>
    <p class="credit">Made by Abhay Mishra</p>
</div>

<div id="gameOverScreen" style="display:none;">
    <h1>GAME OVER</h1>
    <p>Your Score: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">PLAY AGAIN</button>
    <p class="credit">Made by Abhay Mishra</p>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let bird, pipes, coins, score, gravity, gameRunning, frame;

// Bird
function createBird() {
    return {
        x: 80,
        y: canvas.height / 2,
        radius: 15,
        velocity: 0,
        color: '#ffeb3b'
    }
}

// Pipe
function createPipe(x) {
    let gap = 150;
    let topHeight = Math.random() * (canvas.height - gap - 200) + 50;
    return {
        x: x,
        topHeight: topHeight,
        bottomY: topHeight + gap,
        width: 60,
        passed: false
    }
}

// Coin
function createCoin(x, y) {
    return {
        x: x,
        y: y,
        radius: 10,
        collected: false
    }
}

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';

    bird = createBird();
    pipes = [createPipe(400), createPipe(650)];
    coins = [];
    score = 0;
    gravity = 0.4;
    gameRunning = true;
    frame = 0;
    updateScore();
    gameLoop();
}

function restartGame() {
    startGame();
}

function gameOver() {
    gameRunning = false;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOverScreen').style.display = 'block';
}

function updateScore() {
    document.getElementById('score').innerText = score;
}

function drawBird() {
    ctx.fillStyle = bird.color;
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fill();
    // eye
    ctx.fillStyle = 'black';
    ctx.beginPath();
    ctx.arc(bird.x + 5, bird.y - 3, 3, 0, Math.PI * 2);
    ctx.fill();
}

function drawPipes() {
    ctx.fillStyle = '#4CAF50';
    for(let pipe of pipes) {
        // Top pipe
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
        // Bottom pipe
        ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
    }
}

function drawCoins() {
    for(let coin of coins) {
        if(!coin.collected) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '12px Arial';
            ctx.fillText('$', coin.x-4, coin.y+4);
        }
    }
}

function update() {
    if(!gameRunning) return;

    frame++;

    // Bird movement
    bird.velocity += gravity;
    bird.y += bird.velocity;

    // Pipes movement
    for(let i=0; i<pipes.length; i++) {
        pipes[i].x -= 3;

        // Add score when passed
        if(pipes[i].x + pipes[i].width < bird.x &&!pipes[i].passed) {
            pipes[i].passed = true;
            score += 1;
            updateScore();
        }

        // Reset pipe
        if(pipes[i].x < -pipes[i].width) {
            pipes[i] = createPipe(pipes[i].x + 500);
            // Add coin in the gap
            coins.push(createCoin(pipes[i].x + 30, (pipes[i].topHeight + pipes[i].bottomY)/2));
        }

        // Collision with pipe
        if(bird.x + bird.radius > pipes[i].x && bird.x - bird.radius < pipes[i].x + pipes[i].width) {
            if(bird.y - bird.radius < pipes[i].topHeight || bird.y + bird.radius > pipes[i].bottomY) {
                gameOver();
            }
        }
    }

    // Coins movement and collection
    for(let coin of coins) {
        coin.x -= 3;
        let dx = bird.x - coin.x;
        let dy = bird.y - coin.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < bird.radius + coin.radius &&!coin.collected) {
            coin.collected = true;
            score += 1; // 1 coin = 1 point
            updateScore();
        }
    }

    // Remove off-screen coins
    coins = coins.filter(c => c.x > -20 &&!c.collected);

    // Collision with ground/ceiling
    if(bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
        gameOver();
    }
}

function draw() {
    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background clouds effect
    ctx.fillStyle = 'white';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;

    drawPipes();
    drawCoins();
    drawBird();
}

function gameLoop() {
    update();
    draw();
    if(gameRunning) requestAnimationFrame(gameLoop);
}

// Controls
function fly() {
    if(gameRunning) bird.velocity = -8;
}

document.addEventListener('keydown', e => {
    if(e.code === 'Space') fly();
});
canvas.addEventListener('click', fly);
canvas.addEventListener('touchstart', fly);
</script>
</body>
</html>
